<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fun Facts - Shortcuts</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="loading-text">Loading facts...</div>
    </div>

    <header>
      <h1>Fun Facts</h1>
      <div class="clock">
        <h2><b>Current Time:</b> <span id="clock"></span></h2>
      </div>
    </header>

   <!--  <section class="actions">
      <div class="facts-container facts" id="facts">
      </div> -->
    <div id="fact-container">
    <h2>Did you know?</h2>
    <!-- The fact will be displayed here -->
    <p id="fact-text">Loading a useless fact...</p>
    <button onclick="fetchFact()" class="card large card-vertical">Get Another Fact</button>
</div>

<script>
    async function fetchFact() {
        const factElement = document.getElementById('fact-text');
        factElement.innerText = "Loading...";
        
        try {
            // 1. Fetch data from the API endpoint
            const response = await fetch('https://uselessfacts.jsph.pl/api/v2/facts/random');
            
            // 2. Parse the response into a JSON object
            const data = await response.json();
            
            // 3. Access the 'text' property and display it in the <p> tag
            factElement.innerText = data.text;
        } catch (error) {
            factElement.innerText = "Failed to load fact. Check your connection!";
            console.error("Error fetching fact:", error);
        }
    }

    // Call the function once when the page first loads
    fetchFact();
</script>
      
      <div class="grid">
        <a href="learn.html" class="card large card-vertical special small">
          <img src="images/back.webp" alt="Back to Learn" class="card-icon-vertical">
          <span class="card-label">Back</span>
        </a>
      </div>
    </section>

    <script src="script.js"></script>
    
  </body>
</html>
