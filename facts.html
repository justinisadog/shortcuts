<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fun Facts - Shortcuts</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="loading-text">Loading facts...</div>
    </div>

    <header>
      <h1>Fun Facts</h1>
      <div class="clock">
        <h2><b>Current Time:</b> <span id="clock"></span></h2>
      </div>
    </header>

    <section class="actions">
      <div class="facts-container facts" id="facts">
        <!-- Facts will be loaded here -->
      </div>
      
      <div class="grid">
        <a href="learn.html" class="card large card-vertical special small">
          <img src="images/back.webp" alt="Back to Learn" class="card-icon-vertical">
          <span class="card-label">Back</span>
        </a>
      </div>
    </section>

    <script src="script.js"></script>
    
  </body>
</html>
