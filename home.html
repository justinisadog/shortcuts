<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shortcuts</title>
  <meta name="description" content="Home page">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Website Shortcuts</h1>
    <div class="clock">
      <h2><b>Current Time:</b> <span id="clock"></span></h2>
    </div>
  </header>
  <section class="actions">
  <div class="grid">
    <a href="/games.html" class="card large card-vertical">
      <img src="images/game.png" alt="" class="card-icon-vertical" aria-hidden="true">
      <span class="card-label">Games</span>
    </a>
    <a href="entertain.html" class="card large card-vertical">
      <img src="images/entertain.png" alt="" class="card-icon-vertical" aria-hidden="true">
      <span class="card-label">Entertainment</span>
    </a>
    <a href="learn.html" class="card large card-vertical">
      <img src="images/learn.png" alt="" class="card-icon-vertical" aria-hidden="true">
      <span class="card-label">Learn</span>
    </a>
    <a href="code.html" class="card large card-vertical">
      <img src="images/code.webp" alt="" class="card-icon-vertical" aria-hidden="true">
      <span class="card-label">Code</span>
    </a>
  </div>
</section>
<script src="script.js"></script>
</body>
</html>
